<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | NDU Mart</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Google Font: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Material Symbols for Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <!-- Font Awesome for Social/Card Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: '#F96302',
                        primary: '#1A1A1A',
                        secondary: '#F4F4F4',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-primary min-h-screen flex flex-col">

<!-- BEGIN: Header -->
<header class="bg-white sticky top-0 z-50 shadow-sm border-b border-gray-100">
<div class="container mx-auto px-4 py-4 flex flex-wrap items-center justify-between gap-4">
<!-- Logo -->
<div class="flex items-center gap-2">
<div class="w-10 h-10 bg-accent rounded-lg flex items-center justify-center">
<svg class="h-6 v-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<a href="index.html" class="text-lg sm:text-xl font-extrabold tracking-tight uppercase">NDU <span class="text-accent">Mart</span></a>
</div>
<!-- Search Bar -->
<div class="w-full md:w-auto md:flex-1 max-w-2xl order-3 md:order-2 mt-2 md:mt-0">
<form class="relative group">
<input class="w-full pl-4 pr-32 py-2.5 rounded-lg border-gray-200 focus:ring-accent focus:border-accent transition-all" placeholder="Search for products, brands and categories..." type="text">
<div class="absolute right-1 top-1 flex items-center">
<select class="hidden lg:block text-xs border-0 border-l border-gray-200 focus:ring-0 py-1.5 mr-1 bg-transparent">
<option>All Categories</option>
<option>Electronics</option>
<option>Fashion</option>
</select>
<button class="bg-accent text-white px-5 py-1.5 rounded-lg hover:bg-orange-600 transition-colors">
<svg class="h-5 v-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</form>
</div>
<!-- Icons -->
    <div class="flex items-center gap-3 sm:gap-6 order-2 md:order-3 ml-auto md:ml-0">
        <!-- Cart Icon -->
        <a href="shopping_cart_v2.html" class="flex items-center gap-2 text-gray-700 hover:text-accent transition-colors relative group">
            <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center group-hover:bg-accent/10 transition-all">
                <svg class="h-5 v-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                </svg>
            </div>
            <span class="absolute -top-1 -right-1 bg-accent text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white min-w-[20px] text-center">0</span>
        </a>

        <!-- Dynamic Auth Buttons -->
        <div id="auth-buttons" class="flex items-center gap-2 sm:gap-4">
            <a href="login.html" class="px-4 py-2 sm:px-5 sm:py-2 text-sm font-bold text-white bg-accent rounded-lg hover:bg-[#9e3c00] transition-all duration-300 shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                Login
            </a>
            <a href="signup.html" class="px-4 py-2 sm:px-6 sm:py-2.5 text-sm font-bold text-white bg-accent rounded-lg hover:bg-[#9e3c00] transition-all duration-300 shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                Sign Up
            </a>
        </div>
    </div>
</div>
<!-- Secondary Nav Bar -->
<nav class="border-t border-gray-100 hidden md:block">
<div class="container mx-auto px-4 flex items-center justify-start gap-10 h-10 text-[11px] font-bold uppercase tracking-wider">
<a class="hover:text-accent transition-colors" href="index.html">Home</a>
<a class="hover:text-accent transition-colors" href="shop_by_category.html">Categories</a>
<a class="hover:text-accent transition-colors" href="computing_department.html">Computing</a>
<a class="hover:text-accent transition-colors" href="fashion_department.html">Fashion</a>
<a class="hover:text-accent transition-colors" href="gaming_department.html">Gaming</a>
</div>
</nav>
</header>
<!-- END: Header -->

<main class="flex-grow container mx-auto px-4 py-8 sm:py-12">
    <div class="flex items-center gap-4 mb-8">
        <a href="index.html" class="w-10 h-10 rounded-full bg-white border border-gray-100 flex items-center justify-center text-gray-500 hover:text-accent hover:border-accent transition-all">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="text-3xl font-headline font-extrabold text-gray-900 tracking-tight">Your Shopping Bag</h1>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
        <!-- Cart Items List -->
        <div class="lg:col-span-8 space-y-4" id="cart-items-container">
            <!-- Items injected by JS -->
            <div class="bg-white p-8 rounded-3xl border border-gray-100 text-center animate-pulse">
                <p class="text-gray-400 font-medium">Loading your items...</p>
            </div>
        </div>

        <!-- Order Summary -->
        <aside class="lg:col-span-4 lg:sticky lg:top-28">
            <div class="bg-white rounded-[2.5rem] p-8 border border-gray-100 shadow-xl shadow-gray-200/40">
                <h2 class="text-xl font-headline font-extrabold text-gray-900 mb-6 uppercase tracking-wider">Order Summary</h2>
                <div class="space-y-4 mb-8 text-sm font-medium">
                    <div class="flex justify-between text-gray-500">
                        <span>Subtotal</span>
                        <span class="text-gray-900" id="subtotal-val">$0.00</span>
                    </div>
                    <div class="flex justify-between text-gray-500">
                        <span>Shipping</span>
                        <span class="text-green-600 font-bold">FREE</span>
                    </div>
                    <div class="flex justify-between text-gray-500">
                        <span>Tax</span>
                        <span class="text-gray-900" id="tax-val">$0.00</span>
                    </div>
                    <div class="pt-6 border-t border-gray-50 flex justify-between items-end">
                        <span class="text-lg font-bold text-gray-900">Total</span>
                        <span class="text-4xl font-headline font-extrabold text-accent" id="total-val">$0.00</span>
                    </div>
                </div>

                <a href="checkout_flow.html" id="checkout-btn" class="w-full bg-accent text-white py-5 rounded-2xl font-bold text-lg flex items-center justify-center gap-3 shadow-xl shadow-accent/20 hover:bg-accent-dark hover:-translate-y-0.5 active:scale-95 transition-all">
                    Secure Checkout
                    <span class="material-symbols-outlined">lock</span>
                </a>

                <div class="mt-8 pt-8 border-t border-gray-50">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-4 text-center">We Accept</p>
                    <div class="flex justify-center gap-4 text-gray-400 text-2xl">
                        <i class="fa-brands fa-cc-visa"></i>
                        <i class="fa-brands fa-cc-mastercard"></i>
                    </div>
                </div>
            </div>
        </aside>
    </div>
</main>

<script src="core.js"></script>
<script>
    function renderCart() {
        const container = document.getElementById('cart-items-container');
        const cartItems = JSON.parse(localStorage.getItem('cartItems') || '[]');
        
        if (cartItems.length === 0) {
            container.innerHTML = `
                <div class="bg-white p-16 rounded-[3rem] border border-gray-100 text-center space-y-6">
                    <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto text-gray-300">
                        <span class="material-symbols-outlined text-4xl">shopping_cart</span>
                    </div>
                    <div>
                        <h3 class="text-xl font-bold text-gray-900">Your bag is empty</h3>
                        <p class="text-gray-400 mt-2">Looks like you haven't added anything yet.</p>
                    </div>
                    <a href="index.html" class="inline-flex py-4 px-8 bg-gray-900 text-white rounded-2xl font-bold hover:bg-accent transition-all">
                        Back to Shopping
                    </a>
                </div>
            `;
            updateSummary(0);
            return;
        }

        let subtotal = 0;
        container.innerHTML = cartItems.map(item => {
            subtotal += item.price * item.quantity;
            return `
                <article class="product-card bg-white p-5 rounded-3xl border border-gray-100 flex flex-col sm:flex-row items-center gap-6 relative group">
                    <div class="w-24 h-24 sm:w-32 sm:h-32 bg-gray-50 rounded-2xl overflow-hidden flex-shrink-0">
                        <img src="${item.imageUrl || 'images/default.png'}" alt="${item.name}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-grow space-y-1 text-center sm:text-left pt-2 sm:pt-0">
                        <h4 class="text-lg font-bold text-gray-900 leading-tight">${item.name}</h4>
                        <div class="flex items-center justify-center sm:justify-start gap-4">
                            <span class="text-accent font-extrabold text-xl">$${parseFloat(item.price).toFixed(2)}</span>
                            <div class="flex items-center bg-gray-50 rounded-xl px-2 py-1 border border-gray-100">
                                <button onclick="updateQty(${item.productId}, -1)" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-accent font-bold transition-colors">-</button>
                                <span class="w-8 text-center text-sm font-bold text-gray-700">${item.quantity}</span>
                                <button onclick="updateQty(${item.productId}, 1)" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-accent font-bold transition-colors">+</button>
                            </div>
                        </div>
                    </div>
                    <div class="sm:text-right w-full sm:w-auto">
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest hidden sm:block">Item Total</p>
                        <p class="text-xl font-headline font-extrabold text-gray-900">$${(item.price * item.quantity).toFixed(2)}</p>
                    </div>
                    <button onclick="removeItem(${item.productId})" class="absolute top-4 right-4 p-2 text-gray-200 hover:text-red-500 transition-colors">
                        <span class="material-symbols-outlined text-xl">close</span>
                    </button>
                </article>
            `;
        }).join('');

        updateSummary(subtotal);
    }

    function updateQty(id, delta) {
        let cartItems = JSON.parse(localStorage.getItem('cartItems') || '[]');
        const item = cartItems.find(i => (i.productId || i.id) == id);
        if (item) {
            item.quantity += delta;
            if (item.quantity <= 0) {
                cartItems = cartItems.filter(i => (i.productId || i.id) != id);
            }
        }
        
        let cartCount = cartItems.reduce((acc, curr) => acc + curr.quantity, 0);
        localStorage.setItem('cartItems', JSON.stringify(cartItems));
        localStorage.setItem('cartCount', cartCount.toString());
        
        if (window.updateCartUI) window.updateCartUI();
        renderCart();
    }

    function removeItem(id) {
        let cartItems = JSON.parse(localStorage.getItem('cartItems') || '[]');
        cartItems = cartItems.filter(i => (i.productId || i.id) != id);
        
        let cartCount = cartItems.reduce((acc, curr) => acc + curr.quantity, 0);
        localStorage.setItem('cartItems', JSON.stringify(cartItems));
        localStorage.setItem('cartCount', cartCount.toString());
        
        if (window.updateCartUI) window.updateCartUI();
        renderCart();
    }

    function updateSummary(subtotal) {
        const tax = subtotal * 0.05; // 5% tax
        const total = subtotal + tax;
        
        document.getElementById('subtotal-val').innerText = `$${subtotal.toFixed(2)}`;
        document.getElementById('tax-val').innerText = `$${tax.toFixed(2)}`;
        document.getElementById('total-val').innerText = `$${total.toFixed(2)}`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderCart();
    });
</script>

</body>
</html>
